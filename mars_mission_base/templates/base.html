<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b0d17;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .mars-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0b0d17 100%);
            border-bottom: 2px solid #c1440e;
            margin-bottom: 30px;
        }
        h1 {
            color: #c1440e;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(193, 68, 14, 0.6);
        }
        h4 {
            color: #4caf50;
            font-style: italic;
            margin-top: 10px;
        }
        .content-container {
            min-height: 60vh;
        }
        footer {
            background-color: #1a1a2e;
            border-top: 1px solid #333;
            padding: 20px 0;
            margin-top: 40px;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>
    <header class="mars-header">
        <h1>Миссия Колонизация Марса</h1>
        <h4>И на Марсе будут яблони цвести!</h4>
    </header>

    <div class="container content-container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container">
            <small>&copy; 2024 Mars Colonization Project. All systems nominal.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
